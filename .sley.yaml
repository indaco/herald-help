# sley configuration file
# Documentation: https://github.com/indaco/sley

# Enabled plugins:
#   - commit-parser
#   - tag-manager
#   - changelog-generator

# Workspace configuration for monorepo support
workspace:
  # Versioning mode: "independent" (each module versioned separately)
  versioning: independent
  # Discovery settings for automatic module detection
  discovery:
    enabled: true
    recursive: true
    module_max_depth: 10
    # exclude:
    #   - "custom-dir"

  # Discovered modules (uncomment to use explicit configuration)
  # modules:
  #   - name: root
  #     path: .version
  #   - name: cobra
  #     path: cobra/.version
  #   - name: kong
  #     path: kong/.version
  #   - name: urfave
  #     path: urfave/.version

# Plugin configuration
# Each module can have its own .sley.yaml to override these settings.
plugins:
  # Analyzes conventional commits to suggest version bumps
  commit-parser: true
  # Automatically creates git tags after version changes
  tag-manager:
    enabled: true
    prefix: "{module_path}/v"
  # Generates changelogs from git commits
  changelog-generator:
    enabled: true
    use-default-icons: true
    contributors:
      enabled: true
      show-name: false

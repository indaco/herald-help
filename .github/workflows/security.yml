name: security

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6:00 AM UTC
  push:
    branches:
      - main
    paths:
      - "**.go"
      - "**/go.mod"
      - "**/go.sum"
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "**/go.mod"
      - "**/go.sum"
  workflow_dispatch:

permissions: {}

env:
  GO_VERSION: "1.25"

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        module:
          - { name: root, path: ".", cache: "go.sum" }
          - { name: cobra, path: cobra, cache: "cobra/go.sum" }
          - { name: kong, path: kong, cache: "kong/go.sum" }
          - { name: urfave, path: urfave, cache: "urfave/go.sum" }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module.cache }}
          check-latest: true

      - name: Install Go modules
        working-directory: ${{ matrix.module.path }}
        run: go mod download

      - name: Verify dependencies
        working-directory: ${{ matrix.module.path }}
        run: go mod verify

      - name: Install govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        working-directory: ${{ matrix.module.path }}
        run: govulncheck ./...

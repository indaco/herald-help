name: "ci: cobra"

on:
  push:
    branches: "**"
    paths:
      - "cobra/**.go"
      - "cobra/go.mod"
      - "cobra/go.sum"
  pull_request:
    branches: "**"
    paths:
      - "cobra/**.go"
      - "cobra/go.mod"
      - "cobra/go.sum"
  workflow_dispatch:

permissions: {}

env:
  GO_VERSION: "1.25"

defaults:
  run:
    working-directory: cobra

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cobra/go.sum
          check-latest: true

      - name: Install Go modules
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-mode: binary
          skip-cache: false
          install-only: true

      - name: Install Go tools
        run: |
          go install golang.org/x/tools/gopls/internal/analysis/modernize/cmd/modernize@latest

      - name: Run go modernize
        run: modernize --fix ./...

      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cobra/go.sum
          check-latest: true

      - name: Install Go modules
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run test
        run: go test ./...

  test-race:
    name: test-race
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cobra/go.sum
          check-latest: true

      - name: Install Go modules
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests with race detector
        run: go test -race ./...
